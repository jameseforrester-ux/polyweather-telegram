# Curated monthly climate normals for the airports Polymarket actually uses
# as resolution stations for daily high-temp markets.
#
# The bot discovers these from the Wunderground URL embedded in each
# Polymarket event's description (e.g.  wunderground.com/.../KBKF), so this
# file does NOT need an entry for every market — only the ones we want
# higher-accuracy climatology for. Airports missing from this file fall
# back to a parametric latitude × month model (see climatology.py).
#
# Airport coordinates and timezones come from the `airportsdata` package
# at runtime; this file only provides:
#   monthly_normals: 12 months of [daily_max_F, daily_min_F]
#   peak_local_hour: hour-of-day (local) where daily max typically occurs.
#                    Default 15. Coastal sites with sea breeze: 14. Desert: 16.
#
# Normals values are approximate NOAA NCEI 1991-2020 normals for each
# specific station (NOT a substitute "nearby" airport). Refine these against
# the actual station's published normals when convenient.
#
# Verified Polymarket → Resolution airport pairs (as of May 2026):
#   NYC         → KLGA  (LaGuardia)
#   Miami       → KMIA  (Miami International)
#   Austin      → KAUS  (Austin-Bergstrom)
#   Chicago     → KORD  (O'Hare)
#   Denver      → KBKF  (Buckley SFB, Aurora — NOT Denver International!)
#   Los Angeles → KLAX  (LAX)
#   Houston     → KHOU  (William P. Hobby — NOT Bush Intercontinental!)
#   Seattle     → KSEA  (SeaTac)
#   Atlanta     → KATL  (Hartsfield-Jackson — likely; verify on next market)
#
# Polymarket also runs international markets (London, Hong Kong, etc.) which
# are out of HRRR's CONUS scope and not handled by this build.

