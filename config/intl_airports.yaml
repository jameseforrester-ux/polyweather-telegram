# Polymarket sometimes runs daily-temperature markets for non-US cities
# without including a Wunderground URL in the description. This file maps
# the city name (from the market title "Highest temperature in CITY on ...")
# to the ICAO code of its likely resolution airport.
#
# These are educated guesses based on each city's primary international
# airport. If Polymarket actually resolves a city against a different
# station, just edit the ICAO here and restart the bot. The bot will log
# `Using parametric fallback climo for KICAO` for any airport without
# curated climate normals in airport_normals.yaml — add a block there if
# you want better-than-parametric accuracy for a city you trade often.
#
# Match is case-insensitive on the city name as it appears in the title.

# Europe
"London":      EGLL    # Heathrow
"Paris":       LFPG    # Charles de Gaulle
"Madrid":      LEMD    # Barajas
"Amsterdam":   EHAM    # Schiphol
"Frankfurt":   EDDF    # Frankfurt
"Munich":      EDDM    # Munich
"Milan":       LIMC    # Malpensa
"Warsaw":      EPWA    # Chopin
"Helsinki":    EFHK    # Vantaa
"Moscow":      UUEE    # Sheremetyevo
"Istanbul":    LTFM    # Istanbul Airport (new)
"Ankara":      LTAC    # Esenboğa

